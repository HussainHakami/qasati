version: '3.8'

services:
  qasati:
    # Uncomment the next line to pull from Docker Hub instead of building locally
    # image: YOUR_DOCKERHUB_USERNAME/qasati:main
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qasati-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - qasati-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  qasati-logs:
    driver: local
